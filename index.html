<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css"> <!-- Global styles -->
    <title>Game Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
            background-color: #f0f0f0;
        }
        h1 {
            margin-bottom: 30px;
        }
        .game-button {
            display: block;
            margin: 10px 0;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            text-align: center;
        }
        .game-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>My Games</h1>

    <!-- Add more buttons below as needed -->
    <a href="https://allanhu100.github.io/redirect?id=dino_game&source=games_page" class="game-button">Dino Game</a>
    <a href="https://allanhu100.github.io/redirect?id=tic_tac_toe&source=games_page" class="game-button">Tic-Tac-Toe</a>
    <a href="https://allanhu100.github.io/redirect?id=snake_game&source=games_page" class="game-button">Snake</a>

</body>
</html>
